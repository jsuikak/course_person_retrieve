<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>课程人物检索系统</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header-row">
        <div>
          <h1>课程人物检索系统</h1>
          <p class="subtitle">基于新接口（face/person）重构版</p>
        </div>
        <div class="status-dock" id="statusDock">
          <button
            class="secondary status-trigger"
            id="statusTrigger"
            type="button"
            aria-haspopup="dialog"
            aria-expanded="false"
            aria-controls="statusPopover"
          >
            系统状态
          </button>
          <div class="status-popover" id="statusPopover" role="dialog" aria-label="系统状态">
            <div class="status-popover-head">
              <h2>系统状态</h2>
              <button class="secondary" id="refreshStatusBtn" type="button">刷新状态</button>
            </div>
            <div class="status-grid" id="statusGrid"></div>
          </div>
        </div>
      </div>
    </header>

    <main class="container page-grid">
      <section class="panel panel-wide">
        <div class="tab-header">
          <h2>检索任务</h2>
          <div class="tab-controls">
            <button class="secondary" id="refreshOptionsBtn" type="button">刷新文件列表</button>
            <div class="tab-switch" role="tablist" aria-label="检索方式切换">
              <button
                id="tabBtnGallery"
                class="tab-btn is-active"
                type="button"
                role="tab"
                aria-controls="tabPaneGallery"
                aria-selected="true"
                data-tab="gallery"
              >
                图片检索图库
              </button>
              <button
                id="tabBtnVideo"
                class="tab-btn"
                type="button"
                role="tab"
                aria-controls="tabPaneVideo"
                aria-selected="false"
                data-tab="video"
              >
                图片检索视频库
              </button>
            </div>
          </div>
        </div>

        <div id="tabPaneGallery" class="tab-pane is-active" role="tabpanel" aria-labelledby="tabBtnGallery">
          <form id="gallerySearchForm" class="form-grid">
            <div class="query-image-row">
              <label>
                <span>查询图片</span>
                <select id="galleryQuerySelect" name="query_path" required></select>
              </label>
              <figure class="query-image-preview-box" id="galleryQueryImagePreview" aria-live="polite"></figure>
            </div>
            <label>
              <span>图库路径</span>
              <select id="galleryPathSelect" name="gallery_path" required></select>
            </label>
            <label>
              <span>特征模式</span>
              <select name="feature_mode">
                <option value="face">face</option>
                <option value="person">person</option>
              </select>
            </label>
            <label>
              <span>人体特征模型(仅用于person模式)</span>
              <select name="person_model">
                <option value="resnet">ResNet-18</option>
                <option value="osnet">OSNet x1.0</option>
              </select>
            </label>
            <label>
              <span>索引名（可选）</span>
              <input name="index_name" type="text" placeholder="默认按图库名" />
            </label>
            <label>
              <span>Top-K</span>
              <input name="topk" type="number" min="1" max="100" value="5" />
            </label>
            <label>
              <span>采样 FPS（视频库）</span>
              <input name="sample_fps" type="number" min="0.1" step="0.1" value="1.0" />
            </label>
            <div class="index-action-row">
              <div class="index-status is-unknown" id="galleryIndexStatus">索引状态: 未检查</div>
              <button class="secondary" id="galleryRefreshIndexBtn" type="button">刷新状态</button>
              <button class="secondary" id="galleryBuildIndexBtn" type="button">构建索引</button>
              <button class="primary" type="submit">开始检索</button>
            </div>
            <p class="message" id="galleryMessage"></p>
          </form>
        </div>

        <div id="tabPaneVideo" class="tab-pane" role="tabpanel" aria-labelledby="tabBtnVideo" hidden>
          <form id="videoSearchForm" class="form-grid">
            <div class="query-image-row">
              <label>
                <span>查询图片</span>
                <select id="videoQuerySelect" name="query_path" required></select>
              </label>
              <figure class="query-image-preview-box" id="videoQueryImagePreview" aria-live="polite"></figure>
            </div>
            <label>
              <span>视频库路径</span>
              <select id="videoPathSelect" name="gallery_path" required></select>
            </label>
            <label>
              <span>特征模式</span>
              <select name="feature_mode">
                <option value="face">face</option>
                <option value="person">person</option>
              </select>
            </label>
            <label>
              <span>人体特征模型</span>
              <select name="person_model">
                <option value="resnet">ResNet-18</option>
                <option value="osnet">OSNet x1.0</option>
              </select>
            </label>
            <label>
              <span>索引名（可选）</span>
              <input name="index_name" type="text" placeholder="默认按视频名" />
            </label>
            <label>
              <span>Top-K</span>
              <input name="topk" type="number" min="1" max="100" value="5" />
            </label>
            <label>
              <span>采样 FPS</span>
              <input name="sample_fps" type="number" min="0.1" step="0.1" value="1.0" />
            </label>
            <div class="index-action-row">
              <div class="index-status is-unknown" id="videoIndexStatus">索引状态: 未检查</div>
              <button class="secondary" id="videoRefreshIndexBtn" type="button">刷新状态</button>
              <button class="secondary" id="videoBuildIndexBtn" type="button">构建索引</button>
              <button class="primary" type="submit">开始视频检索</button>
            </div>
            <p class="message" id="videoMessage"></p>
          </form>
        </div>
      </section>

      <section class="panel panel-wide">
        <div class="result-header">
          <h2>检索结果</h2>
          <button class="secondary" id="clearOutputsBtn" type="button">清理检索输出</button>
        </div>
        <div id="resultSummary" class="result-summary">等待操作</div>
        <div id="queryPreview" class="query-preview"></div>
        <div id="resultGrid" class="result-grid"></div>
      </section>
    </main>

    <script src="/frontend/app.js" defer></script>
  </body>
</html>
